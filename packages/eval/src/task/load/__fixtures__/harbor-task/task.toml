schema_version = "1.3"

[task]
name = "open-insight/harbor-loader"
description = "Harbor loader fixture"
authors = [{ name = "Ada Lovelace", email = "ada@example.com" }, { name = "Grace Hopper" }]
keywords = ["harbor", "loader", "pytest"]

[metadata]
difficulty = "easy"
category = "programming"
tags = ["fixture", "single-step"]

[agent]
timeout_sec = 90.0

[verifier]
timeout_sec = 30.0

[verifier.env]
EXPECTED = "loaded"

[environment]
network_mode = "no-network"
build_timeout_sec = 45.0
cpus = 2
memory_mb = 1024
storage_mb = 4096
gpus = 0

[solution.env]
SOLUTION_MODE = "oracle"
